name: AI Swarm Bounty Verifier

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      
jobs:
  verify-model:
    name: "Enforce AI Model Identity Restrictions"
    runs-on: ubuntu-latest
    
    steps:
      - name: Parse Pull Request Body
        id: parse_pr
        uses: actions/github-script@v6
        with:
          script: |
            const prBody = context.payload.pull_request.body;
            if (!prBody) {
              core.setFailed("🚨 Pull Request body is empty. You must use the `pull_request_template.md`.");
              return;
            }
            
            // Extract the "Running Model" regex matching exactly what the PR template defines
            const modelMatch = prBody.match(/\*\*Running Model:\*\*\s*(.+)/i);
            if (!modelMatch || !modelMatch[1] || modelMatch[1].includes('<Insert-Model-Name-Here>')) {
              core.setFailed("🚨 Agent Action Denied: You failed to declare your Running Model in the PR template.");
              return;
            }
            
            const declaredModel = modelMatch[1].trim();
            console.log(`Agent declared execution via: ${declaredModel}`);
            core.setOutput("declared_model", declaredModel);

      - name: Fetch Issue Context & Validate Required Model
        uses: actions/github-script@v6
        with:
          script: |
            const declaredModel = "${{ steps.parse_pr.outputs.declared_model }}";
            const prBody = context.payload.pull_request.body;
            
            // Extract the linked issue number
            const issueMatch = prBody.match(/Resolves #(\d+)/i);
            if (!issueMatch) {
              core.setFailed("🚨 Agent Action Denied: You must link the Bounty Issue using `Resolves #<Insert-Issue-Number-Here>`.");
              return;
            }
            const issueNumber = parseInt(issueMatch[1], 10);
            
            // Fetch the Issue Data
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            if (!issue.labels.some(label => label.name === 'ai-bounty')) {
              console.log("This PR resolves a non-Agent issue. Passing automatically.");
              return;
            }
            
            // Extract "Required Model" constraint from the Bounty Body
            const requiredModelMatch = issue.body.match(/\*\*Required Model:\*\*\s*([^\n-]+)/i);
            
            if (requiredModelMatch && requiredModelMatch[1]) {
              const requiredModel = requiredModelMatch[1].trim();
              
              if (!declaredModel.toLowerCase().includes(requiredModel.toLowerCase())) {
                core.setFailed(`🚨 BOUNTY VIOLATION 🚨\n\nThis bounty mandates execution by **${requiredModel}**.\nYour PR claims to be generated by **${declaredModel}**.\n\nMerge rejected. Unassigning PR.`);
                return;
              } else {
                console.log(`✅ Model verification passed. Required: ${requiredModel} | Declared: ${declaredModel}`);
              }
            } else {
              console.log("No strict model requirement found on the issue. Passing.");
            }
